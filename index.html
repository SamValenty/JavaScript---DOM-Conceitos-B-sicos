<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM: Página Interativa</title>
</head>
<body>
    <h1>DOM: Página Interativa com JavaScript</h1>

    <hr>
    
    <h2>Contador</h2>
    <button id="incrementar">+</button>
    <button id="decrementar">-</button>
    <span id="contador">0</span>

    <hr>

    <h2>Digite um texto</h2>
    <input type="text" id="inputTexto" placeholder="Digite e Pressione Enter">
    <p>Caracteres (sem espaço): <span id="contadorCaracteres">0</span></p>

    <div id="paragrafos"></div>

    <hr>

    <h2>Adicionar lista</h2>
    <select id="tipoLista">
        <option value="ol">Lista ordenada</option>
        <option value="ul">Lista não-ordenada</option>
    </select>
    <button id="addLista">Adicionar Itens a Lista</button>

    <div id="listas"></div>

    <hr>

    <button id="resetar">Resetar</button>

    <script src="script.js"></script>
</body>
</html>
